<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | LinkTracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
        <div id="messageDiv" class="message" style="display: none;"></div>

        <form id="signupForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="mobile" placeholder="Mobile Number (e.g., +919876543210)" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password (min 6 characters)" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-user-plus"></i> Sign Up with Email</button>
        </form>

        <div class="divider">or</div>

        <button id="googleSignupBtn" class="provider-btn"><i class="fab fa-google"></i> Sign up with Google</button>
        <button id="facebookSignupBtn" class="provider-btn"><i class="fab fa-facebook-f"></i> Sign up with Facebook</button>

        <div class="phone-auth-section">
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phoneSignup" placeholder="Phone with country code (e.g., +919876543210)">
            </div>
            <button id="sendOtpSignupBtn" class="btn-secondary">Send OTP</button>
            <div id="otpSectionSignup" style="display: none;">
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="otpCodeSignup" placeholder="Enter OTP">
                </div>
                <button id="verifyOtpSignupBtn" class="btn-primary">Verify & Sign Up</button>
            </div>
        </div>

        <div class="link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber, updateProfile } from "firebase/auth";
        import { getDatabase, ref, set } from "firebase/database";

        // Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCx-yIgRBdqqaZm5mnCs6XicbJHqf442mQ",
    authDomain: "netrackers.firebaseapp.com",
    databaseURL: "https://netrackers-default-rtdb.firebaseio.com",
    projectId: "netrackers",
    storageBucket: "netrackers.firebasestorage.app",
    messagingSenderId: "362299470159",
    appId: "1:362299470159:web:dce2775a7c6fdd6970153a",
    measurementId: "G-FHJSFVG3RE"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const messageDiv = document.getElementById('messageDiv');
        let confirmationResult = null;

        function showMessage(msg, isError = true) {
            messageDiv.textContent = msg;
            messageDiv.className = isError ? 'message error' : 'message success';
            messageDiv.style.display = 'block';
            setTimeout(() => messageDiv.style.display = 'none', 4000);
        }

        // Helper to save user profile to DB
        async function saveUserProfile(uid, name, email, mobile) {
            await set(ref(db, `users/${uid}/profile`), {
                name: name,
                email: email,
                mobile: mobile,
                createdAt: Date.now()
            });
        }

        // Email/Password Signup
        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!fullName || !email || !mobile || !password) {
                showMessage('Please fill all fields');
                return;
            }
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters');
                return;
            }
            if (password !== confirm) {
                showMessage('Passwords do not match');
                return;
            }
            if (!mobile.startsWith('+')) {
                showMessage('Mobile number must include country code (e.g., +91...)');
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await updateProfile(user, { displayName: fullName });
                await saveUserProfile(user.uid, fullName, email, mobile);
                showMessage('Account created! Redirecting...', false);
                setTimeout(() => window.location.href = "index.html", 1500);
            } catch (error) {
                showMessage(error.message);
            }
        });

        // Google Signup
        const googleProvider = new GoogleAuthProvider();
        document.getElementById('googleSignupBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const name = user.displayName || '';
                const email = user.email || '';
                await saveUserProfile(user.uid, name, email, '');
                showMessage('Signed up with Google! Redirecting...', false);
                setTimeout(() => window.location.href = "index.html", 1500);
            } catch (error) {
                showMessage(error.message);
            }
        });

        // Facebook Signup
        const facebookProvider = new FacebookAuthProvider();
        document.getElementById('facebookSignupBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, facebookProvider);
                const user = result.user;
                const name = user.displayName || '';
                const email = user.email || '';
                await saveUserProfile(user.uid, name, email, '');
                showMessage('Signed up with Facebook! Redirecting...', false);
                setTimeout(() => window.location.href = "index.html", 1500);
            } catch (error) {
                showMessage(error.message);
            }
        });

        // Phone OTP Signup
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'sendOtpSignupBtn', { size: 'invisible' });
        document.getElementById('sendOtpSignupBtn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phoneSignup').value.trim();
            if (!phoneNumber || !phoneNumber.startsWith('+')) {
                showMessage('Enter phone number with country code (e.g., +91...)');
                return;
            }
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                document.getElementById('otpSectionSignup').style.display = 'block';
                showMessage('OTP sent!', false);
            } catch (error) {
                showMessage(error.message);
            }
        });

        document.getElementById('verifyOtpSignupBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otpCodeSignup').value.trim();
            if (!otp || !confirmationResult) {
                showMessage('Enter OTP');
                return;
            }
            try {
                const result = await confirmationResult.confirm(otp);
                const user = result.user;
                // For phone signup, we need to collect name/email separately? We can prompt or use default.
                // Here we'll store minimal profile; user can complete later in dashboard.
                await saveUserProfile(user.uid, 'User', user.phoneNumber, user.phoneNumber);
                showMessage('Phone verified! Redirecting...', false);
                setTimeout(() => window.location.href = "index.html", 1500);
            } catch (error) {
                showMessage(error.message);
            }
        });
    </script>
</body>
</html>
