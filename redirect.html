<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            background: #f4f8fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .redirect-card {
            background: white;
            padding: 2rem 2.5rem;
            border-radius: 36px;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0eef3;
            border-top: 4px solid #0f4c5f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #b91c1c;
            background: #ffe6e6;
            padding: 0.8rem;
            border-radius: 60px;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        .success {
            color: #0f4c5f;
            background: #e0f0f5;
            padding: 0.8rem;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        button {
            background: #0f4c5f;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: 500;
        }
        a {
            color: #0f4c5f;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, get, update, push } from "firebase/database";

        document.addEventListener("DOMContentLoaded", async () => {
            // 🔁 REPLACE WITH YOUR FIREBASE CONFIGURATION
            // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCx-yIgRBdqqaZm5mnCs6XicbJHqf442mQ",
  authDomain: "netrackers.firebaseapp.com",
  databaseURL: "https://netrackers-default-rtdb.firebaseio.com",
  projectId: "netrackers",
  storageBucket: "netrackers.firebasestorage.app",
  messagingSenderId: "362299470159",
  appId: "1:362299470159:web:dce2775a7c6fdd6970153a",
  measurementId: "G-FHJSFVG3RE"
};

            // Initialize Firebase
            let app, db;
            try {
                app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                console.log("✅ Firebase initialized");
            } catch (err) {
                console.error("❌ Firebase init error:", err);
                document.getElementById('message').innerHTML = '<div class="error">🔥 Firebase config error.</div>';
                return;
            }

            const messageDiv = document.getElementById('message');
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('id');

            if (!linkId) {
                messageDiv.innerHTML = '<div class="error">❌ Missing link ID.</div>';
                return;
            }

            const linkRef = ref(db, `links/${linkId}`);

            messageDiv.innerHTML = '<div>⏳ Preparing redirect...</div>';

            try {
                // 1. Get link data
                const snapshot = await get(linkRef);
                if (!snapshot.exists()) {
                    messageDiv.innerHTML = '<div class="error">🔍 Link not found.</div>';
                    return;
                }

                const data = snapshot.val();
                let destination = data.destinationUrl;

                if (!destination) {
                    messageDiv.innerHTML = '<div class="error">⚠️ Destination URL is empty.</div>';
                    return;
                }

                // Fix URL protocol
                if (!destination.startsWith('http://') && !destination.startsWith('https://')) {
                    destination = 'https://' + destination;
                }

                // Validate URL
                try {
                    new URL(destination);
                } catch (e) {
                    messageDiv.innerHTML = `<div class="error">❌ Invalid URL: ${destination}</div>`;
                    return;
                }

                // 2. Collect visitor data (non‑blocking after this point)
                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const referrer = document.referrer || "Direct";
                const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(userAgent);
                const isAndroid = /Android/i.test(userAgent);
                const isIOS = /iPhone|iPad|iPod/i.test(userAgent);
                const isChrome = /Chrome/i.test(userAgent) && !/Edg/i.test(userAgent);
                const isFirefox = /Firefox/i.test(userAgent);
                const isSafari = /Safari/i.test(userAgent) && !/Chrome/i.test(userAgent);

                // Detect traffic source
                let source = "Direct";
                if (referrer.includes("whatsapp")) source = "WhatsApp";
                else if (referrer.includes("google")) source = "Google";
                else if (referrer.includes("facebook") || referrer.includes("fb.com")) source = "Facebook";
                else if (referrer.includes("twitter")) source = "Twitter";
                else if (referrer.includes("instagram")) source = "Instagram";
                else if (referrer.includes("linkedin")) source = "LinkedIn";
                else if (referrer.includes("telegram")) source = "Telegram";
                else if (referrer !== "Direct") source = "Other";

                // Screen size
                const screenSize = {
                    width: screen.width,
                    height: screen.height
                };

                // 3. Fetch location data (non‑blocking for redirect)
                let locationData = {};
                const geoPromise = fetch("https://ipapi.co/json/")
                    .then(res => res.ok ? res.json() : {})
                    .catch(err => {
                        console.warn("GeoIP fetch failed:", err);
                        return {};
                    });

                // 4. Immediately redirect – don't wait for geo or Firebase save
                messageDiv.innerHTML = '<div class="success">✅ Redirecting now...</div>';
                setTimeout(() => {
                    window.location.replace(destination);
                }, 300); // tiny delay so user sees the message, but no blocking

                // 5. After redirect is triggered, finish collecting data and save
                geoPromise.then(loc => {
                    // Prepare visit data
                    const visitData = {
                        ip: loc.ip || "hidden",
                        country: loc.country_name || "unknown",
                        city: loc.city || "unknown",
                        region: loc.region || "unknown",
                        isp: loc.org || "unknown",
                        latitude: loc.latitude || null,
                        longitude: loc.longitude || null,
                        userAgent: userAgent.slice(0, 120), // Truncated to save space
                        os: platform,
                        referrer: referrer,
                        source: source,
                        device: isMobile ? "Mobile" : "Desktop",
                        deviceType: isMobile ? (isAndroid ? "Android" : isIOS ? "iOS" : "Mobile") : "Desktop",
                        browserName: isChrome ? "Chrome" : isFirefox ? "Firefox" : isSafari ? "Safari" : "Other",
                        screen: screenSize,
                        timestamp: new Date().toISOString()
                    };

                    // Save visit – non‑blocking, fire and forget
                    const visitsRef = ref(db, `links/${linkId}/visits`);
                    const newVisitRef = push(visitsRef);
                    update(newVisitRef, visitData)
                        .then(() => console.log("✅ Visit saved successfully"))
                        .catch(err => console.warn("Visit save failed:", err));

                    // Increment click count – also non‑blocking
                    update(linkRef, {
                        clickCount: (data.clickCount || 0) + 1
                    }).catch(err => console.warn("Click increment failed:", err));
                });
            } catch (error) {
                console.error("Fatal error:", error);
                messageDiv.innerHTML = `<div class="error">🔥 Error: ${error.message || 'Unknown'}</div>`;
            }
        });
    </script>
</head>
<body>
    <div class="redirect-card">
        <h3>🔗 LinkTracker</h3>
        <div class="spinner"></div>
        <p>You will be redirected instantly...</p>
        <div id="message"></div>
        <small style="display: block; margin-top: 1rem;">⚡ <a href="/">Go to dashboard</a></small>
    </div>
</body>
</html>
